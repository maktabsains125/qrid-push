<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#8f61a5">
  <title>Registration Dashboard</title>

  <!-- Detect PWA mode and tag <html> -->
  <script>
    (function () {
      var isPWA =
        (window.matchMedia &&
         window.matchMedia('(display-mode: standalone)').matches);

      // iOS Safari / older installs
      if (!isPWA && window.navigator.standalone) {
        isPWA = true;
      }

      if (isPWA) {
        document.documentElement.classList.add('pwa'); // adds class="pwa" to <html>
      }
    })();
  </script>

  <!-- Safe-area / PWA offset -->
  <style>
    html, body {
      background:#8f61a5;
      margin:0;
    }

    /* 🔹 Only when installed as PWA */
    html.pwa body,
    html.pwa .page,
    html.pwa .shell,
    html.pwa .app {
      /* Base push-down so white bar can't cut header */
      padding-top: calc(env(safe-area-inset-top, 0px) + 19px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* Small extra breathing space for header content */
    html.pwa header.top {
      padding-top: 8px;
    }
  </style>

  <!-- Shared styles -->
  <link rel="stylesheet" href="/shared/style.css"/>
  <link rel="stylesheet" href="/shared/kebab/kebab.css"/>

  <!-- Shared scripts -->
  <script defer src="/shared/kebab/kebab.js"></script>

  <!-- Role requirement -->
  <meta name="required-role" content="REGIS">
</head>
<body>
  <div class="app">

    <!-- ===== Top purple container ===== -->
    <header class="top">
      <div class="welcome">
        <h1>WELCOME</h1>
        <div class="user" id="whoami">[USER]</div>
      </div>

      <!-- Right side: logo + kebab menu -->
      <div class="right">
        <div class="logoWrap" aria-hidden="true">
          <div class="logoCircle">
            <img src="/shared/logo512-raya.png" alt="School Logo" onerror="this.style.display='none'"/>
          </div>
        </div>

        <!-- Kebab (three-dots) button -->
        <button class="kebab" id="menuBtn" aria-label="Menu" title="Menu" type="button">
          <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
            <circle cx="12" cy="5" r="2"></circle>
            <circle cx="12" cy="12" r="2"></circle>
            <circle cx="12" cy="19" r="2"></circle>
          </svg>
        </button>
      </div>

      <!-- Kebab open + task listener -->
      <script>
        document.addEventListener("DOMContentLoaded", () => {
          document.getElementById("menuBtn")?.addEventListener("click", () => window.Kebab?.open());
          document.addEventListener("kebab:task", () => {
            location.assign("https://mspsbs-tasks.netlify.app/");
          });
        });
      </script>
    </header>

    <!-- ===== Peach container ===== -->
    <section class="peach">
      <div class="peachText">Regis QR-ID Dashboard</div>
    </section>

    <!-- ===== Grey container (2×2 grid) ===== -->
    <main class="panel">
      <div class="grid">
        <button class="tile" aria-label="camera" type="button">
          <img src="/shared/icons/Camera100.png" alt="" loading="lazy">
        </button>
        <button class="tile" aria-label="displays" type="button">
          <img src="/shared/icons/Displays100.png" alt="" loading="lazy">
        </button>
        <button class="tile" aria-label="attendances" type="button">
          <img src="/shared/icons/Attendances100.png" alt="" loading="lazy">
        </button>
        <button class="tile" aria-label="profile" type="button">
          <img src="/shared/icons/Profile100.png" alt="" loading="lazy">
        </button>
        <a href="/shared/contacts/index.html" class="tile" aria-label="ft_list">
          <img src="/shared/icons/FTList100.png" alt="" loading="lazy">
        </a>
        <a href="/shared/transfer/index.html" class="tile" aria-label="transfer">
          <img src="/shared/icons/Transfer100.png" alt="" loading="lazy">
        </a>
      </div>
    </main>

    <!-- ===== Bottom purple container ===== -->
    <footer class="bottom"></footer>

  </div> <!-- /app -->

  <!-- ===== Core functions ===== -->
  <script src="/auth.js"></script>
  <script>
    function setWhoami(selector = '#whoami') {
      const who = window.Auth?.who?.();
      const el  = document.querySelector(selector);
      if (!who || !el) return;
      const r = String(who.role || '').trim();
      el.textContent = r ? `${who.code} (${r})` : `${who.code}`;
    }

    Auth.requireRole('REGIS');
    setWhoami('#whoami');

    // multi-tab logout sync
    window.addEventListener('storage', e=>{
      if (e.key === 'ms_logout_broadcast') location.replace('/?logout=1');
    });
  </script>

  <!-- ==== Wirings ==== -->
  <script>
  (function(){
    // ==== Camera button ====
    const CAM_PATH = "/shared/camera/index.html";
    const camBtn = document.querySelector('.tile[aria-label="camera"], .tile[aria-label="Camera"]');
    camBtn?.addEventListener('click', ()=>{ location.assign(CAM_PATH); });

    // ==== Displays button ====
    const DISPLAY_PATH = "/shared/displays/index.html";
    const dispBtn = document.querySelector('.tile[aria-label="displays"], .tile[aria-label="Displays"]');
    dispBtn?.addEventListener('click', ()=>{ location.assign(DISPLAY_PATH); });

    // ==== Attendance button ====
    const ATTENDANCE_PATH = "/shared/attendance/index.html";
    const attendanceBtn = document.querySelector('.tile[aria-label="attendances"], .tile[aria-label="Attendances"]');
    attendanceBtn?.addEventListener('click', () => location.assign(ATTENDANCE_PATH));

    // ==== Profile (role-aware) ====
    (function(){
      const btn = document.querySelector('.tile[aria-label="profile"]');
      if (!btn) return;

      const who  = window.Auth?.who?.() || {};
      const theRole = String(who.role || '').toUpperCase();

      const PATH_BY_ROLE = {
        FT:      '/shared/profile/index.html',
        REGIS:   '/shared/profile/index.html',
        ADMIN:   '/shared/profile/index.html',
        HEP:     '/shared/profile/index.html',
        WELFARE: '/shared/profile/index.html',
      };

      const ALLOW = new Set(Object.keys(PATH_BY_ROLE));

      if (!ALLOW.has(theRole)) {
        btn.disabled = true;
        btn.style.opacity = '0.45';
        btn.style.pointerEvents = 'none';
        return;
      }

      const dest = PATH_BY_ROLE[theRole] || '/shared/profile/index.html';
      btn.addEventListener('click', () => location.assign(dest));
    })();

  })();
  </script>

  <!-- ===== Displays Warm-up ===== -->
  <script>
  (function warmDisplays(){
    const who = Auth.who && Auth.who();
    if (!who) return;
    const PROXY = "/.netlify/functions/displays";
    const CACHE_KEY = "ms_displays_cache_v1";
    const url = `${PROXY}?full=1&warm=1`;

    function go(){
      fetch(url, { cache: "no-store", keepalive: true })
        .then(r => r.ok ? r.json() : null)
        .then(data => {
          if (!data) return;
          localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), data }));
        })
        .catch(()=>{});
    }

    if ("requestIdleCallback" in window) {
      requestIdleCallback(go, { timeout: 2000 });
    } else {
      setTimeout(go, 500);
    }
  })();
  </script>

</body>
</html>
