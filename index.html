<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>QR-ID Attendance • Login</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8f61a5">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="QR-ID">

  <link rel="apple-touch-icon" href="/homescreen192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/homescreen512.png">

  <!-- Optional -->
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="./style.css"/>
</head>

<body>
  <main class="shell">

    <!-- ===== Top purple band ===== -->
    <header class="band band--top">
      <h1 class="appTitle">QR-ID ATTENDANCE</h1>
    </header>

    <!-- ===== Grey main panel ===== -->
    <section class="panel">

      <!-- Overlapping logo -->
      <div class="logoBadge" aria-hidden="true">
        <div class="logoCircle">
          <img src="/shared/logo512.png" alt="MSPSBS Logo"/>
        </div>
      </div>

      <!-- Login card -->
      <div class="card" id="loginCard">
        <h2 class="cardTitle">Log in</h2>

        <label class="label" for="code">Teacher code</label>
        <div class="inputWrap">
          <input id="code" type="text" placeholder="ABC" inputmode="text" autocomplete="username"/>
        </div>

        <label class="label" for="password">Password</label>
        <div class="inputWrap">
          <input id="password" type="password" placeholder="•••••" autocomplete="current-password"/>
          <button type="button" class="peek" id="peekBtn" aria-label="Show password" title="Hold to peek">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5c5 0 9 5 9 7s-4 7-9 7-9-5-9-7 4-7 9-7zm0 3a4 4 0 100 8 4 4 0 000-8z"/>
            </svg>
          </button>
        </div>

        <div id="loginMsg"></div>
      </div>
    </section>

    <!-- ===== Peach band (3 buttons) ===== -->
    <section class="band band--peach">
      <div class="peachActions">
        <button class="loginBtn" id="loginBtn" type="button">Login</button>
        <a href="https://qrid-forgot-pw.netlify.app/" id="forgotBtn">Forgot Password</a>
        <a href="https://mspsbs-registration-signup.netlify.app/" id="signupBtn">Sign up</a>
      </div>
    </section>

    <!-- ===== Bottom purple band with legal links ===== -->
    <footer class="band band--bottom">
      <div class="legal">
        <a href="/shared/legal/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>
        <span aria-hidden="true">•</span>
        <a href="/shared/legal/tos.html" target="_blank" rel="noopener">Terms of Service</a>
      </div>
    </footer>

  </main>

  <!-- Scripts -->
  <script src="/auth.js"></script>
  <script src="/login-dom-lite.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => {
      alert('SW registered: ' + reg.scope);
    })
    .catch(err => {
      alert('SW failed');
    });
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('SW registered'))
    .catch(err => console.log('SW error', err));
}
</script>

  <!-- Password peek JS -->
  <script>
    (function(){
      const pwd  = document.getElementById('password');
      const peek = document.getElementById('peekBtn');
      if (!pwd || !peek) return;

      const show = () => { pwd.type = 'text'; };
      const hide = () => { pwd.type = 'password'; };

      peek.addEventListener('mousedown', show);
      peek.addEventListener('mouseup', hide);
      peek.addEventListener('mouseleave', hide);
      peek.addEventListener('touchstart', e => { e.preventDefault(); show(); }, { passive: false });
      peek.addEventListener('touchend', hide);
    })();
  </script>

</body>
</html>
