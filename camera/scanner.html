<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#8f61a5">
  <title>QR-ID Attendance • Scanner</title>

  <!-- Shared styles -->
  <link rel="stylesheet" href="./style.css"/>
  <link rel="stylesheet" href="/shared/stylesheet/left-kebab.css"/>

  <!-- Scripts -->
  <script src="/auth.js" defer></script>
  <script src="./scanner.js" defer></script>
</head>
<body>
  <div class="app">

<header class="top">
  <div class="left">
    <!-- Kebab menu -->
    <button class="kebab-btn" id="kebabBtn" aria-label="Menu" type="button">⋮</button>
  </div>

  <h1 class="title">QR-ID ATTENDANCE</h1>

  <div class="right">
    <!-- Exit (X) button -->
    <button id="exitBtn" class="closeBtn" aria-label="Exit to dashboard" title="Exit" type="button">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6 6 L18 18 M18 6 L6 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</header>

    <section class="note">
	  <div class="info">Using the school Wi-Fi will be slower.</div>
	</section> 

    <!-- Actions: 3 modes -->
    <section class="actions">
      <button id="cameraBtn"  class="btn">Camera</button>
      <button id="scannerBtn" class="btn primary">Scanner</button>
      <button id="manualBtn"  class="btn">Manual</button>
    </section>

    <!-- Windows -->
    <section class="windows">
      <h2 class="windowsTitle">Clock-in windows</h2>
      <div class="winCardGrid">
        <div class="winCard"><div class="winTime" id="amTime">06:25–08:00 (L: 07:31)</div></div>
        <div class="winCard"><div class="winTime" id="pmTime">11:25–14:00 (L: 13:01)</div></div>
      </div>
    </section>
	
	    <!-- Scanner input (always ready) -->
    <section class="scanner">
      <div class="scannerInner">
        <input
          id="scannerInput"
          type="text"
          autocomplete="off"
          inputmode="none"
          placeholder="Just use the USB or bluetooth scanner"
          aria-label="QR scanner input"
        />
      </div>
    </section>

    <!-- Live status -->
    <div id="status" class="status hidden" aria-live="polite">Recording …</div>

    <!-- Result -->
    <section id="result" class="card hidden" aria-live="polite" aria-atomic="true">
      <div class="row"><div class="label">Name</div><div class="value bold" id="resName">—</div></div>
      <div class="row"><div class="label">ID</div><div class="value" id="resId">—</div></div>
      <div class="row"><div class="label">Mark</div><div class="value" id="resMark">—</div></div>
      <div class="row"><div class="label">Clock-in time</div><div class="value" id="resTime">—</div></div>    
      <div class="cardActions"><button id="closeCard" class="btn dark">Close</button></div>
    </section>

    <footer class="bottom"></footer>
	
	<!-- ===== Kebab panel (left side panel + dim right side) ===== -->
    <div class="overlay" id="overlay" hidden>
      <div class="overlay-panel">
        <div class="panel-head">
          <div class="panel-title">Greetings</div>
          <button class="panel-close" id="panelCloseBtn" type="button">✕</button>
        </div>

        <div class="panel-list">
          <button class="panel-item" id="goBookGreetings" type="button">Book greetings</button>
          <button class="panel-item" id="goMySchedule" type="button">Personal schedule</button>
          <button class="panel-item" id="goAdmin" type="button">Admin</button>
        </div>
      </div>

      <div class="overlay-dim" id="overlayDim"></div>
    </div>

   </div>
</body>
</html>
