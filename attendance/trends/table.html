<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Attendance Table</title>
  <link rel="stylesheet" href="./style.css"/>

  <!-- auth -->
  <script src="/auth.js" defer></script>

  <!-- table logic -->
  <script src="./table.js" defer></script>
</head>
<body>
  <div class="page">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topgrid">
        <!-- Centered title, no kebab -->
        <h1 class="title">ATTENDANCE TABLE</h1>
        <button class="topBtn closeBtn" id="exitBtn" aria-label="Close">
          ×
        </button>
      </div>
    </header>

    <!-- Loading (reusing same style) -->
    <div id="loadStatus" class="statusRow" role="status" aria-live="polite">
      <span class="statusText"><strong>Please wait. Loading...</strong></span>
    </div>

    <!-- Two grey cards -->
    <main class="tableMain">
      <!-- Table by levels -->
      <section class="tableCard">
        <div class="tableCardHead">Table by levels</div>
        <div class="tableCardBody">
          <div class="tableScroll">
            <table id="tblLevels" class="dataTable" aria-label="Table by levels"></table>
          </div>
        </div>
      </section>

      <!-- Table by groupings -->
      <section class="tableCard">
        <div class="tableCardHead">Table by groupings</div>
        <div class="tableCardBody">
          <div class="tableScroll">
            <table id="tblGroups" class="dataTable" aria-label="Table by groupings"></table>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
