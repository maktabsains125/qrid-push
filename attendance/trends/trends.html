<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Attendance Charts</title>
  <link rel="stylesheet" href="./style.css"/>

  <!-- Chart.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- jsPDF (for charts → PDF) -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- auth + shared role nav -->
  <script src="/auth.js" defer></script>
  
  <!-- App -->
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="page">

    <!-- ===== Top bar (kebab | heading | X) ===== -->
    <header class="topbar">
      <div class="topgrid">
        <button class="topBtn" id="kebabBtn" aria-label="Menu">
          <span class="kebabDots"></span>
          <span class="kebabDots"></span>
          <span class="kebabDots"></span>
        </button>

        <h1 class="title">ATTENDANCE CHARTS</h1>

        <!-- Keep id="exitBtn" so existing JS still works -->
        <button class="topBtn closeBtn" id="exitBtn" aria-label="Close">
          ×
        </button>
      </div>
    </header>

    <!-- ===== Kebab slideout menu (overlay style) ===== -->
    <div id="kebabPanel" class="overlay" hidden aria-hidden="true">
      <!-- dim area on the right -->
      <div id="kebabDim"
           class="overlay-dim"
           role="button"
           tabindex="0"
           aria-label="Close menu"></div>

      <!-- left panel -->
      <div class="overlay-panel">
        <div class="panel-head">
          <div class="panel-title">Options</div>
          <button class="panel-close" id="panelCloseBtn" aria-label="Close menu">✕</button>
        </div>

        <div class="panel-list">
          <button class="panel-item" id="btnTable">Table</button>
          <button class="panel-item" id="btnDownload">Download</button>
        </div>
      </div>
    </div>

    <!-- Download dialog overlay -->
    <div id="downloadOverlay" class="dlOverlay" hidden aria-hidden="true">
      <div id="downloadDim" class="dlOverlay-dim"></div>
      <div class="dlPanel" role="dialog" aria-modal="true" aria-labelledby="dlTitle">
        <div class="dlHead">
          <h2 id="dlTitle">Download</h2>
        </div>
        <p class="dlMessage">Do you want to download the charts and tables?</p>
        <div class="dlActions">
          <button class="dlBtn" data-choice="none">No</button>
          <!-- Charts = PDF now -->
          <button class="dlBtn" data-choice="charts">Charts (PDF)</button>
          <button class="dlBtn" data-choice="tables">Tables (CSV)</button>
          <button class="dlBtn dlBtn--highlight" data-choice="both">Both</button>
        </div>
      </div>
    </div>

    <!-- Loading (no animation) -->
    <div id="loadStatus" class="statusRow" role="status" aria-live="polite">
      <span class="statusText"><strong>Please wait. Loading...</strong></span>
    </div>
	
	 <!-- Mode toggle: Late/Absent vs On Time/Present -->
    <nav class="modeToggle" aria-label="Display mode">
      <span class="modeLabel modeLabel--left">
        LATE &amp; ABSENT
      </span>

      <button
        id="modeSwitch"
        class="modeSwitch"
        type="button"
        aria-pressed="false"
      >
        <span class="modeSwitch-track">
          <span class="modeSwitch-thumb"></span>
        </span>
      </button>

      <span class="modeLabel modeLabel--right">
        ON TIME &amp; PRESENT
      </span>
    </nav>

        <!-- Tabs -->
    <nav class="tabs" role="tablist" aria-label="Session switch">
      <button id="tabAm" class="tab active" role="tab" aria-selected="true">AM session</button>
      <button id="tabPm" class="tab" role="tab" aria-selected="false">PM session</button>
      <button id="tabOverall" class="tab tab--overall" role="tab" aria-selected="false">Overall</button>
    </nav>


    <!-- Grey container (flush to tabs) -->
    <main class="panel" id="panel">

      <section id="amWrap" class="wrap" aria-labelledby="tabAm"></section>
      <section id="pmWrap" class="wrap hidden" aria-labelledby="tabPm"></section>
      <section id="overallWrap" class="wrap hidden" aria-labelledby="tabOverall"></section>
    </main>
  </div>
</body>
</html>
