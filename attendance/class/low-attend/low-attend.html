<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Attendance • 85% OR BELOW</title>

  <link rel="stylesheet" href="./low-attend.css"/>
  <link rel="stylesheet" href="/shared/kebab/kebab.css"/>

  <!-- auth + shared role nav -->
  <script src="/auth.js" defer></script>
  <script src="./low-attend.js" defer></script>

</head>
<body>
  <div class="page">

    <!-- Header: 3-col grid (5% 90% 5%) -->
    <header class="head">
      <!-- LEFT: vertical kebab -->
      <button id="kebabBtn" class="head-kebab" aria-label="Open menu" title="Menu">⋮</button>

      <!-- CENTER: title -->
      <h1 class="head-title">85% OR BELOW</h1>

      <!-- RIGHT: X (26px) -->
      <a class="head-x" href="/shared/attendance/class/cls-reports.html" aria-label="Back">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.3 5.7a1 1 0 0 0-1.4 0L12 10.6 7.1 5.7A1 1 0 1 0 5.7 7.1L10.6 12l-4.9 4.9a1 1 0 1 0 1.4 1.4L12 13.4l4.9 4.9a1 1 0 0 0 1.4-1.4L13.4 12l4.9-4.9a1 1 0 0 0 0-1.4Z"/>
        </svg>
      </a>
    </header>

    <!-- Subheading -->
    <div class="subhead" id="subhead">Year 7</div>

    <!-- NOTE:
         CSV button removed from here.
         It will appear inside the kebab panel via low-attend.js injection.
    -->

    <!-- Loading status (content injected by JS) -->
    <div id="loadStatus" class="centerStatus" role="status" aria-live="polite" style="display:none"></div>

    <!-- Grey container with the rendered table inside -->
    <section class="card">
      <div class="tableWrap">
        <table id="grid" class="grid"></table>
        <div id="gridError" class="gridError" hidden></div>
      </div>
    </section>
  </div>

  <!-- Right half panel (menu) + dark left overlay -->
  <div class="overlay" id="overlay" hidden>
    <div class="overlay-dim" id="overlayDim"></div>
    <aside class="overlay-panel" role="dialog" aria-modal="true" aria-label="">
      <div class="panel-head">
        <div class="panel-title">Select Year</div>
        <button class="panel-close" id="kebabClose" aria-label="Close menu">✕</button>
      </div>
      <nav class="panel-list">
        <!-- Download button will be injected here by JS -->
        <button class="panel-item" data-year="7">Year 7</button>
        <button class="panel-item" data-year="8">Year 8</button>
        <button class="panel-item" data-year="9">Year 9</button>
        <button class="panel-item" data-year="10">Year 10</button>
        <button class="panel-item" data-year="12">Year 12</button>
        <button class="panel-item" data-year="13">Year 13</button>
      </nav>
    </aside>
  </div>

  <!-- Student Card (center modal) -->
  <div class="stuCard" id="stuCard" hidden role="dialog" aria-modal="true" aria-label="Student details">
    <div class="stuCard-dim" id="stuCardDim" tabindex="-1"></div>
    <div class="stuCard-panel" role="document">
      <div class="stuCard-head">
        <div class="stuCard-title">Student Details</div>
        <button class="stuCard-close" id="stuCardClose" aria-label="Close student card">✕</button>
      </div>
      <div class="stuCard-body">
        <div class="stuRow">
          <div class="stuLabel">Name</div>
          <div class="stuValue" id="stuName">—</div>
        </div>
        <div class="stuRow">
          <div class="stuLabel">ID</div>
          <div class="stuValue" id="stuId">—</div>
        </div>
        <div class="stuRow">
          <div class="stuLabel">Class</div>
          <div class="stuValue" id="stuClass">—</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
