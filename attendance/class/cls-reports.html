<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#8f61a5" />
  <title>Monthly Reports</title>
 

  <!-- Styles -->
  <link rel="stylesheet" href="./style.css" />

  <!-- Auth helpers (must load before app.js) -->
  <script src="/auth.js"></script>
  <!-- Optional: FT guard -->
  <!-- <script defer src="/gate-ft.js"></script> -->

  <!-- App logic -->
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="page">

    <!-- ===== Top header (10% / 80% / 10%) ===== -->
    <header class="topgrid">
      <div class="col col--l"></div>
      <div class="col col--c">
        <h1 class="title"><span id="yy"></span> MONTHLY REPORTS</h1>
      </div>
      <div class="col col--r">
        <button id="closeTop" class="closeBtn" type="button" aria-label="Close and return">×</button>
      </div>
    </header>

    <!-- ===== MAIN: Home (buttons) ===== -->
    <main id="homeView" class="home" role="main">
      <section class="panel">
        <div class="levelGrid">

          <!-- Special buttons -->
          <button class="pill levelBtn" type="button" data-level="85% or below">Low attendance</button>
          <button class="pill levelBtn" type="button" data-target="/shared/attendance/class/full-attend/full-attend.html">Full attendance</button>

        </div>
      </section>
    </main>

    <!-- ===== LEVEL VIEW (shown after choosing a level) ===== -->
    <section id="levelView" class="levelView" hidden>
      <button id="closeLevel" class="closeBtn closeBtn--level" type="button" aria-label="Back to Profiles">×</button>

      <!-- Tabs -->
      <nav class="tabsWrap" aria-label="View switch">
        <button id="tabSearch" class="tab tab--left tab--active" type="button">Search</button>
        <button id="tabClass" class="tab tab--right" type="button">Class</button>
      </nav>

      <!-- Grey slab directly attached to tabs (no margin) -->
      <div class="slab">
        <!-- Content for the selected level goes here -->
      </div>
    </section>

  </div>
</body>
</html>
