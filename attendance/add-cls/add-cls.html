<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#8f61a5" />
  <title>Add Classes to Database</title>

  <!-- ✅ Prevent flash of unauthorized content -->
  <style>
    html { visibility: hidden; }
  </style>

  <!-- Shared styles -->
  <link rel="stylesheet" href="/shared/attendance/style.css" />
  <link rel="stylesheet" href="/shared/stylesheet/left-kebab.css" />
  <link rel="stylesheet" href="./add-cls.css" />

  <!-- Material Symbols (for kebab radios consistency) -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=radio_button_checked,radio_button_unchecked" />
  <style>
    .material-symbols-outlined{
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24;
    }
  </style>

  <!-- JS (order matters) -->
  <script src="/auth.js"></script>
  <!-- kebab.js should be loaded before using LeftKebab.guard -->
  <script src="/shared/attendance/reports/kebab.js"></script>

  <script>
    // 🔐 HARD GUARD — blocks direct URL access
    // NOTE: If LeftKebab.guard is async inside kebab.js, this immediate "visible" might reveal too early.
    // Here, visibility is restored only after guard call completes synchronously.
    try {
      if (window.LeftKebab && typeof LeftKebab.guard === "function") {
        LeftKebab.guard({
          key: "addCls",
          redirectTo: "/shared/attendance/reports/reports.html"
        });
      }
    } finally {
      // ✅ Reveal page ONLY if guard passed (or guard is unavailable)
      document.documentElement.style.visibility = "visible";
    }
  </script>

  <!-- Page logic -->
  <script src="./add-cls.js" defer></script>
</head>

<body>
  <div class="page addcls">

    <!-- ===== Header ===== -->
    <header class="topgrid" role="banner">
      <div class="col col--l">
        <button id="kebabBtn"
                class="kebab-btn"
                type="button"
                aria-label="Open menu">⋮</button>
      </div>

      <div class="col col--c">
        <h1 class="title">ADD CLASSES TO DATABASE</h1>
      </div>

      <div class="col col--r">
        <button id="xBtn"
                class="closeBtn"
                aria-label="Return to reports"
                type="button">×</button>
      </div>
    </header>

    <!-- ===== Main panel ===== -->
    <main class="panel" role="main" aria-label="Add classes to database">
      <div id="roleMessage" class="role-message"></div>

      <!-- Logger -->
      <section class="card" aria-label="Program">
        <div class="logger-wrap" aria-label="Logger">
          <div class="logger-title">Program</div>
          <div id="logBox"
               class="logger"
               role="status"
               aria-live="polite"></div>
        </div>        
      </section>

      <!-- Controls -->
      <section class="card" aria-label="Controls">
        <div class="form-grid">
          <label class="field">
            <span class="label">Academic Year</span>
            <select id="yearSel" class="select">
              <option value="2026" selected>2026</option>
              <option value="2027">2027</option>
              <option value="2028">2028</option>
			  <option value="2029">2029</option>
			  <option value="2030">2030</option>
			  <option value="2031">2031</option>
            </select>
          </label>
		  
		  
          <label class="field">
            <span class="label">Level</span>
            <select id="levelSel" class="select">
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="12">12</option>
              <option value="13">13</option>
            </select>
          </label>

          <label class="field">
  			<span class="label">Batch Year</span>
  				<select id="batchSel" class="select select--readonly" disabled aria-disabled="true" tabindex="-1">
    			<option value="">Auto-filled</option>
    			<option value="2021">2021</option>
    			<option value="2022">2022</option>
    			<option value="2023">2023</option>
    			<option value="2024">2024</option>
    			<option value="2025">2025</option>
    			<option value="2026">2026</option>
    			<option value="2027">2027</option>
    			<option value="2028">2028</option>
    			<option value="2029">2029</option>
    			<option value="2030">2030</option>
    			<option value="2031">2031</option>
  			</select>
		</label>
        </div>
		<button id="addBtn" class="pill" type="button">Start</button> 
      </section>
    </main>

    <!-- ===== KEBAB OVERLAY ===== -->
    <div id="kebabOverlay" class="overlay" hidden>
      <div class="overlay-dim" id="overlayDim" aria-hidden="true"></div>

      <aside class="overlay-panel" role="dialog" aria-modal="true" aria-label="Data Control">
        <div class="panel-head">
          <div class="panel-title">Data Control</div>
          <button class="panel-close"
                  id="kebabClose"
                  type="button"
                  aria-label="Close menu">✕</button>
        </div>

        <nav class="panel-list" aria-label="Attendance tools">

          <div class="panel-row kebab-row" data-key="archive">
            <button class="radioToggle" type="button" data-for="archiveLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="archiveLink" href="/shared/attendance/archive/archive.html">
              Archive data
            </a>
          </div>

          <div class="panel-row kebab-row" data-key="basicNames">
            <button class="radioToggle" type="button" data-for="basicNamesLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="basicNamesLink" href="/shared/attendance/basic-names/index.html">
              Annual daily reports
            </a>
          </div>

          <div class="panel-row kebab-row" data-key="addCls">
            <button class="radioToggle" type="button" data-for="addClsLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="addClsLink" href="/shared/attendance/add-cls/add-cls.html">
              Add cls to database
            </a>
          </div>
		  
		  <div class="panel-row kebab-row" data-key="massChange">
            <button class="radioToggle" type="button" data-for="masschangeLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="masschangeLink" href="/shared/attendance/mass-change/mass-change.html">
              Change reports
            </a>
          </div>

          <div class="panel-row kebab-row" data-key="autocopy">
            <button class="radioToggle" type="button" data-for="autocopyLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="autocopyLink" href="/shared/attendance/autocopy/autocopy.html">
              Autocopy dates
            </a>
          </div>
		  
		  <div class="panel-row kebab-row" data-key="holiday">
            <button class="radioToggle" type="button" data-for="holidayLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="holidayLink" href="/shared/attendance/holiday/holiday.html">
              Holiday dates
            </a>
          </div>
		  
		  <div class="panel-row kebab-row" data-key="userControl">
            <button class="radioToggle" type="button" data-for="userLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="userLink" href="/shared/attendance/user/user.html">
              User controls
            </a>
          </div>

          <div class="panel-row kebab-row" data-key="manual">
            <button class="radioToggle" type="button" data-for="manualLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="manualLink"
               href="https://docs.google.com/document/d/14OQwpafrM10KgmatFP08GkvNc3W8kUN29bClifCz9tI/edit?usp=drive_link"
               target="_blank" rel="noopener">
              Regis manual
            </a>
          </div>

        </nav>
      </aside>
    </div>
	
  <!-- ===== END OF KEBAB OVERLAY ===== -->
  </div>
</body>
</html>
