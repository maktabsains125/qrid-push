[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."warm-camera"]
  schedule = "*/4 * * * *"

[[redirects]]
  from = "/api/camera"
  to = "/.netlify/functions/camera"
  status = 200

[[scheduled]]
  path = "/.netlify/functions/push-send-daily"
  cron = "*/2 * * * *"