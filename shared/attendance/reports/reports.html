<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#8f61a5"/>
  <title>Daily and Monthly Reports</title>

  <!-- Page styles -->
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="/shared/stylesheet/left-kebab.css"/>

  <!-- Material Symbols: radio icons -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=radio_button_checked,radio_button_unchecked"/>
  <style>
    .material-symbols-outlined{
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24;
    }
  </style>

  <!-- JS (order matters) -->
  <script src="/auth.js"></script>
  <!-- use the shared kebab controller -->
  <script src="/shared/attendance/reports/kebab.js"></script>
  <script src="reports.js" defer></script>
</head>

<body>
  <div class="page reports">

    <!-- ===== Header ===== -->
    <header class="topgrid" role="banner">
      <div class="col col--l">
        <button id="kebabBtn"
                class="kebab-btn"
                type="button"
                aria-label="Open menu">⋮</button>
      </div>

      <div class="col col--c">
        <h1 class="title">DAILY AND MONTHLY REPORTS</h1>
      </div>

      <div class="col col--r">
        <button id="xBtn"
                class="closeBtn"
                type="button"
                aria-label="Return to dashboard">×</button>
      </div>
    </header>

    <!-- ===== Main ===== -->
    <main class="panel" role="main" aria-label="Daily and monthly reports">
      <div id="roleMessage" class="role-message"></div>
      <div id="cardsContainer" class="cards-grid"></div>
    </main>

    <!-- ===== KEBAB OVERLAY ===== -->
    <div id="kebabOverlay" class="overlay" hidden>
      <div class="overlay-dim" id="overlayDim" aria-hidden="true"></div>

      <aside class="overlay-panel" role="dialog" aria-modal="true" aria-label="Data Control">
        <div class="panel-head">
          <div class="panel-title">Data Control</div>
          <button class="panel-close"
                  id="kebabClose"
                  type="button"
                  aria-label="Close menu">✕</button>
        </div>

        <nav class="panel-list" aria-label="Attendance tools">

          <div class="panel-row kebab-row" data-key="archive">
            <button class="radioToggle" type="button" data-for="archiveLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="archiveLink" href="/shared/attendance/archive/archive.html">
              Archive data
            </a>
          </div>

          <div class="panel-row kebab-row" data-key="basicNames">
            <button class="radioToggle" type="button" data-for="basicNamesLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="basicNamesLink" href="/shared/attendance/basic-names/index.html">
              Annual daily reports
            </a>
          </div>

          <div class="panel-row kebab-row" data-key="addCls">
            <button class="radioToggle" type="button" data-for="addClsLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="addClsLink" href="/shared/attendance/add-cls/add-cls.html">
              Add cls to database
            </a>
          </div>
		  
		  <div class="panel-row kebab-row" data-key="massChange">
            <button class="radioToggle" type="button" data-for="masschangeLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="masschangeLink" href="/shared/attendance/mass-change/mass-change.html">
              Change reports
            </a>
          </div>

          <div class="panel-row kebab-row" data-key="autocopy">
            <button class="radioToggle" type="button" data-for="autocopyLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="autocopyLink" href="/shared/attendance/autocopy/autocopy.html">
              Autocopy dates
            </a>
          </div>
		  
		  <div class="panel-row kebab-row" data-key="holiday">
            <button class="radioToggle" type="button" data-for="holidayLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="holidayLink" href="/shared/attendance/holiday/holiday.html">
              Holiday dates
            </a>
          </div>
		  
		  <div class="panel-row kebab-row" data-key="userControl">
            <button class="radioToggle" type="button" data-for="userLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="userLink" href="/shared/attendance/user/user.html">
              User controls
            </a>
          </div>

          <div class="panel-row kebab-row" data-key="manual">
            <button class="radioToggle" type="button" data-for="manualLink">
              <span class="material-symbols-outlined radioIcon">radio_button_unchecked</span>
            </button>
            <a class="panel-item" id="manualLink"
               href="https://docs.google.com/document/d/14OQwpafrM10KgmatFP08GkvNc3W8kUN29bClifCz9tI/edit?usp=drive_link"
               target="_blank" rel="noopener">
              Regis manual
            </a>
          </div>

        </nav>
      </aside>
    </div>
	
	<!-- ===== END OF KEBAB OVERLAY ===== -->

    <div class="bottomPad"></div>
  </div>
</body>
</html>
