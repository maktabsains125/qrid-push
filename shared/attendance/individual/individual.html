<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>INDIVIDUAL ATTENDANCE</title>

  <meta name="theme-color" content="#8f61a5"/>

  <!-- Styles -->
  <link rel="stylesheet" href="./style.css"/>

  <!-- Auth helper (optional) -->
  <script src="/auth.js"></script>

  <!-- App logic -->
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="page">

    <!-- ===== Header 5% / 90% / 5% ===== -->
    <header class="topbar">
      <div class="topgrid">
        <div class="col col--l"></div>
        <div class="col col--c">
          <h1 class="title" id="pageTitle">INDIVIDUAL ATTENDANCE</h1>
        </div>
        <div class="col col--r">
          <button id="closeBtn" class="closeBtn" aria-label="Close" type="button">×</button>
        </div>
      </div>
    </header>

    <!-- ===== Content ===== -->
    <main class="content">

      <!-- ===== Grid View (levels) ===== -->
      <section id="gridView" class="card card--grid" aria-labelledby="gridTitle">
        <div class="grid2">
          <a class="peachBtn" data-level="7"  href="?level=7">Year 7</a>
          <a class="peachBtn" data-level="8"  href="?level=8">Year 8</a>
          <a class="peachBtn" data-level="9"  href="?level=9">Year 9</a>
          <a class="peachBtn" data-level="10" href="?level=10">Year 10</a>
          <a class="peachBtn" data-level="12" href="?level=12">Year 12</a>
          <a class="peachBtn" data-level="13" href="?level=13">Year 13</a>
        </div>
      </section>

      <!-- ===== Year View ===== -->
      <section id="yearView" class="card card--year" hidden>
        <h2 id="yearHeading" class="yearHeading">Year 7 Individual Attendance</h2>
        <p id="statusMsg" class="muted" style="margin:6px 0 10px"></p>

        <!-- Filters block (NEW structure) -->
        <div class="filters">
          <!-- Class (stacked) -->
          <div class="stack">
            <label class="label" for="classSel">Class</label>
            <select id="classSel" class="select" aria-label="Class"></select>
          </div>

          <!-- Name (stacked) -->
          <div class="stack">
            <label class="label" for="nameSel">Name</label>
            <select id="nameSel" class="select" aria-label="Name" disabled></select>
          </div>

          <!-- ID + Gender (side-by-side) -->
          <div class="pair">
            <div class="fg">
              <label class="label" for="idField">ID</label>
              <input id="idField" class="field" type="text" readonly />
            </div>
            <div class="fg">
              <label class="label" for="genderField">Gender</label>
              <input id="genderField" class="field" type="text" readonly />
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="tableWrap" role="region" aria-live="polite">
          <table id="attTable" class="attTable" aria-describedby="tableNote">
            <thead>
              <tr id="headerRow1"></tr>
              <tr id="headerRow2"></tr>
            </thead>
            <tbody id="attBody"></tbody>
          </table>
          <p id="tableNote" class="muted">Scroll horizontally/vertically inside the table.</p>
        </div>
      </section>

    </main>
  </div>
</body>
</html>
